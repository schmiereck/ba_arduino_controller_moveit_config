arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.2
  kinematics_solver_attempts: 5
  mode: global
  position_scale: 1.0
  rotation_scale: 0.0            # 5-DOF arm: ignore orientation entirely
  position_threshold: 0.005      # 5 mm
  orientation_threshold: 6.28    # accept any orientation (2π)
  cost_threshold: 0.01
  minimal_displacement_weight: 0.01
  gd_step_size: 0.0001
arm_with_gripper:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.2
  kinematics_solver_attempts: 5
  mode: global
  position_scale: 1.0
  rotation_scale: 0.0
  position_threshold: 0.005
  orientation_threshold: 6.28
  cost_threshold: 0.01
  minimal_displacement_weight: 0.01
  gd_step_size: 0.0001
gripper:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
